  <!-- Auto-reload: se um chunk falhar (tela preta pós-deploy), recarrega uma vez -->
  <script>
    window.__CHUNK_RELOAD_ATTEMPTED = false;
    window.addEventListener('error', function(e) {
      if (
        !window.__CHUNK_RELOAD_ATTEMPTED &&
        e.message &&
        (e.message.includes('Failed to fetch dynamically imported module') ||
         e.message.includes('Loading chunk') ||
         e.message.includes('Loading CSS chunk') ||
         e.message.includes('Importing a module script failed'))
      ) {
        window.__CHUNK_RELOAD_ATTEMPTED = true;
        console.warn('[CivilTrade] Chunk desatualizado detectado. Recarregando…');
        window.location.reload();
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (
        !window.__CHUNK_RELOAD_ATTEMPTED &&
        e.reason &&
        e.reason.message &&
        (e.reason.message.includes('Failed to fetch dynamically imported module') ||
         e.reason.message.includes('Loading chunk') ||
         e.reason.message.includes('Loading CSS chunk') ||
         e.reason.message.includes('Importing a module script failed'))
      ) {
        window.__CHUNK_RELOAD_ATTEMPTED = true;
        console.warn('[CivilTrade] Chunk desatualizado detectado (promise). Recarregando…');
        window.location.reload();
      }
    });
  </script>
